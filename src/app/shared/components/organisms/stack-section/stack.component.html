<section id="ferramentas" class="pf-section">
  <div class="pf-container" style="position:relative;z-index:1;">

    <!-- Cabeçalho + Filtros -->
    <div class="pf-sec-toprow">
      <div class="pf-sechead">
        <span class="pf-eyebrow">// FERRAMENTAS</span>
        <h2 class="pf-h2">Stack &amp; Ferramentas</h2>
      </div>
      <div class="pf-tabs">
        <button
          *ngFor="let tab of tabs"
          class="pf-tab"
          [class.active]="activeFilter === tab"
          (click)="setFilter(tab)">
          {{ tab }}
        </button>
      </div>
    </div>

    <!-- Grid de grupos de categorias (2 col) -->
    <div class="pf-tool-groups">

      <div *ngFor="let group of filteredGroups" class="pf-tool-group">

        <!-- Header da categoria -->
        <div class="pf-tool-cat-header">
          <span class="pf-tool-cat-icon">

            <!-- server -->
            <svg *ngIf="group.icon === 'server'" width="15" height="15" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect>
              <rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect>
              <line x1="6" y1="6" x2="6.01" y2="6"></line>
              <line x1="6" y1="18" x2="6.01" y2="18"></line>
            </svg>

            <!-- layout -->
            <svg *ngIf="group.icon === 'layout'" width="15" height="15" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="3" y1="9" x2="21" y2="9"></line>
              <line x1="9" y1="21" x2="9" y2="9"></line>
            </svg>

            <!-- database -->
            <svg *ngIf="group.icon === 'database'" width="15" height="15" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
              <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path>
              <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path>
            </svg>

            <!-- ship / anchor -->
            <svg *ngIf="group.icon === 'ship'" width="15" height="15" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="5" r="3"></circle>
              <line x1="12" y1="22" x2="12" y2="8"></line>
              <path d="M5 12H2a10 10 0 0 0 20 0h-3"></path>
            </svg>

            <!-- briefcase -->
            <svg *ngIf="group.icon === 'briefcase'" width="15" height="15" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
              <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
            </svg>

          </span>
          <span class="pf-tool-cat">{{ group.cat }}</span>
        </div>

        <!-- Grid de ferramentas (3 colunas) -->
        <div class="pf-tool-grid">
          <div *ngFor="let item of group.items" class="pf-tool">
            <img
              [src]="deviconUrl(item.slug, item.variant)"
              [alt]="item.label"
              (error)="onImgError($event)" />
            <span>{{ item.label }}</span>
          </div>
        </div>

      </div>

    </div>
  </div>
</section>
