<button
[class]="buttonClasses"
[disabled]=" disabled || isLoading"
(click)="onClick()"
type="button"
aria-label="Button: {{ label }}">

  <!-- Spinner ao carregar -->
  <span *ngIf="isLoading" class="spinner"></span>
  
  <!-- Texto do botão -->
  <span class="button-text">
    {{ label }}
  </span>
  
</button>
