<section id="projetos" class="pf-section">
  <div class="pf-container" style="position:relative;z-index:1;">

    <!-- Cabeçalho + Filtros -->
    <div class="pf-sec-toprow">
      <div class="pf-sechead">
        <span class="pf-eyebrow">// PROJETOS</span>
        <h2 class="pf-h2">Projetos em Destaque</h2>
      </div>
      <div class="pf-tabs">
        <button
          *ngFor="let tab of tabs"
          class="pf-tab"
          [class.active]="activeTab === tab"
          (click)="setTab(tab)">
          {{ tab }}
        </button>
      </div>
    </div>

    <!-- Grid principal -->
    <div class="pf-proj-grid">

      <!-- Card em destaque -->
      <div class="pf-proj-feat-col">
        <div *ngIf="featured; else emptyFeatured" class="pf-feat-card">

          <!-- Chrome do browser -->
          <div class="pf-chrome">
            <span class="pf-dot" style="background:#ef4444"></span>
            <span class="pf-dot" style="background:#eab308"></span>
            <span class="pf-dot" style="background:#22c55e"></span>
            <span class="pf-chrome-url">{{ featured.url }}</span>
          </div>

          <!-- Preview area -->
          <div class="pf-feat-preview">
            <div class="pf-feat-glow"></div>
            <span class="pf-feat-mark">&lt;/&gt;</span>
          </div>

          <!-- Corpo do card -->
          <div class="pf-feat-body">
            <span class="pf-proj-cat">{{ featured.cat }}</span>
            <h3 class="pf-h3" style="font-size:24px;margin-top:6px;">{{ featured.title }}</h3>
            <p class="pf-body" style="font-size:16px;margin:8px 0 16px;">{{ featured.desc }}</p>
            <div class="pf-proj-stack">
              <span *ngFor="let s of featured.stack" class="pf-chip">{{ s }}</span>
            </div>
            <div class="pf-feat-foot">
              <div class="pf-proj-links">
                <a class="pf-proj-link" [href]="featured.demoUrl || '#'" target="_blank">
                  <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                    <polyline points="15 3 21 3 21 9"/>
                    <line x1="10" y1="14" x2="21" y2="3"/>
                  </svg>
                  Demo
                </a>
                <a class="pf-proj-link" [href]="featured.repoUrl || '#'" target="_blank">
                  <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0 0 22 12.017C22 6.484 17.522 2 12 2z"/>
                  </svg>
                  GitHub
                </a>
              </div>
            </div>
          </div>

        </div>

        <ng-template #emptyFeatured>
          <div class="pf-empty">Nenhum projeto nesta categoria.</div>
        </ng-template>
      </div>

      <!-- Lista de mini cards -->
      <div class="pf-proj-list">
        <ng-container *ngIf="rest.length > 0; else emptyRest">
          <div *ngFor="let p of rest" class="pf-proj-card">
            <div class="pf-proj-top">
              <span class="pf-proj-num">#{{ p.id }}</span>
              <div class="pf-proj-links">
                <a class="pf-proj-link" [href]="p.demoUrl || '#'" target="_blank">
                  <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                    <polyline points="15 3 21 3 21 9"/>
                    <line x1="10" y1="14" x2="21" y2="3"/>
                  </svg>
                </a>
                <a class="pf-proj-link" [href]="p.repoUrl || '#'" target="_blank">
                  <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0 0 22 12.017C22 6.484 17.522 2 12 2z"/>
                  </svg>
                </a>
              </div>
            </div>
            <h3 class="pf-h3" style="font-size:18px;">{{ p.title }}</h3>
            <p class="pf-mini-desc">{{ p.desc }}</p>
            <div class="pf-proj-stack" style="margin-top:12px;">
              <span *ngFor="let s of p.stack" class="pf-chip">{{ s }}</span>
            </div>
          </div>
        </ng-container>

        <ng-template #emptyRest>
          <div *ngIf="featured" class="pf-empty">Mais projetos em breve.</div>
        </ng-template>
      </div>

    </div>
  </div>
</section>
