<section id="contato" class="pf-section pf-contact-sec">
  <div class="pf-container" style="position:relative;z-index:1;">

    <!-- Cabeçalho centralizado -->
    <div class="pf-sechead" style="align-items:center;margin:0 auto 40px;text-align:center;">
      <span class="pf-eyebrow">// CONTATO</span>
      <h2 class="pf-h2">Vamos conversar</h2>
    </div>

    <!-- Grid: formulário | lateral -->
    <div class="pf-contact">

      <!-- Formulário -->
      <form class="pf-form" (submit)="onSubmit($event)">

        <!-- Linha: Nome + E-mail -->
        <div class="pf-form-row">
          <label class="pf-field">
            <span>Nome</span>
            <input type="text" placeholder="Seu nome" [(ngModel)]="form.nome" name="nome" />
          </label>
          <label class="pf-field">
            <span>E-mail</span>
            <input type="email" placeholder="seu@email.com" [(ngModel)]="form.email" name="email" />
          </label>
        </div>

        <!-- Assunto -->
        <label class="pf-field">
          <span>Assunto</span>
          <input type="text" placeholder="Sobre o que vamos falar?" [(ngModel)]="form.assunto" name="assunto" />
        </label>

        <!-- Mensagem -->
        <label class="pf-field">
          <span>Mensagem</span>
          <textarea rows="5" placeholder="Conte um pouco do projeto ou da oportunidade..."
            [(ngModel)]="form.mensagem" name="mensagem"></textarea>
        </label>

        <!-- Botão -->
        <button type="submit" class="pf-btn pf-btn-primary" style="align-self:flex-start;margin-top:4px;">
          <span *ngIf="!sent">Enviar Mensagem</span>
          <span *ngIf="sent">Mensagem enviada ✓</span>
          <svg *ngIf="!sent" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
          </svg>
        </button>

      </form>

      <!-- Lateral: links de contato + banner -->
      <div class="pf-contact-side">

        <!-- GitHub -->
        <a class="pf-link-card" href="https://github.com/zeus-crf" target="_blank">
          <span class="pf-link-ic">
            <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
              <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0 0 22 12.017C22 6.484 17.522 2 12 2z"/>
            </svg>
          </span>
          <div class="pf-link-txt">
            <span class="pf-link-label">GitHub</span>
            <span class="pf-link-val">github.com/zeus-crf</span>
          </div>
          <span class="pf-link-cta">
            Ver projetos
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </span>
        </a>

        <!-- LinkedIn -->
        <a class="pf-link-card" href="https://linkedin.com/in/miguel-lopes-conceicao" target="_blank">
          <span class="pf-link-ic">
            <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
              <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
            </svg>
          </span>
          <div class="pf-link-txt">
            <span class="pf-link-label">LinkedIn</span>
            <span class="pf-link-val">in/miguel-lopes-conceicao</span>
          </div>
          <span class="pf-link-cta">
            Conectar
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </span>
        </a>

        <!-- E-mail -->
        <a class="pf-link-card" href="mailto:mpmiguel2007@gmail.com">
          <span class="pf-link-ic">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
              <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
          </span>
          <div class="pf-link-txt">
            <span class="pf-link-label">E-mail</span>
            <span class="pf-link-val">mpmiguel2007&#64;gmail.com</span>
          </div>
          <span class="pf-link-cta">
            Enviar e-mail
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </span>
        </a>

        <!-- Banner disponível -->
        <div class="pf-avail-banner">
          <span class="pf-otw-dot"></span>
          <div>
            <strong>Disponível para novos projetos</strong>
            <span>CLT ou Freelance</span>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Footer dentro da seção de contato -->
  <footer class="pf-footer">
    <span class="pf-logo-sm">MP</span>
    <span class="pf-foot-copy">© 2026 Miguel Pereira · Full-Stack Developer</span>
    <nav class="pf-foot-links">
      <a routerLink="/sobre">Sobre</a>
      <a routerLink="/projetos">Projetos</a>
      <a routerLink="/ferramentas">Ferramentas</a>
      <a routerLink="/experiencia">Experiência</a>
      <a routerLink="/contato">Contato</a>
    </nav>
  </footer>

</section>
